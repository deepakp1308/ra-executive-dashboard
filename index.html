<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporting & Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Intuit / QBO FY27 Design System ─────────────────────────────────────── */
:root {
  --sidebar:      #111111;
  --bg:           #f5f5f5;
  --card:         #ffffff;
  --border:       #e0e0e0;
  --shadow:       0 1px 4px rgba(0,0,0,0.08);
  --text:         #111111;
  --muted:        #666666;
  --accent:       #222222;
  --ai-teal:      #444444;
  --ai-teal-bg:   rgba(0,0,0,0.04);
  --green:        #1a8a4a;
  --green-bg:     #e6f4ea;
  --red:          #c42b2b;
  --red-bg:       #fce8e8;
  --amber:        #b87a00;
  --amber-bg:     #fef3e0;
  --chart-navy:   #111111;
  --chart-blue:   #555555;
  --chart-teal:   #888888;
  --chart-pink:   #999999;
  --py-color:     #aaaaaa;
  --radius:       8px;
  --font:         'Avenir Next', -apple-system, 'Helvetica Neue', Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: var(--font); color: var(--text); min-height: 100vh; }

/* ── Header ── */
.header {
  background: var(--sidebar);
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-left h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
.header-left p  { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }
.header-right   { font-size: 11px; color: rgba(255,255,255,.35); text-align: right; line-height: 1.7; }

/* ── Tab navigation ── */
.tabs {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  gap: 0;
}
.tab-btn {
  padding: 12px 20px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font);
}
.tab-btn:hover { color: var(--accent); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Filter bar ── */
.filters {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 32px;
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-group       { display: flex; align-items: center; gap: 5px; }
.filter-group label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.filter-btn {
  padding: 4px 12px;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--muted);
  transition: all .15s;
  font-family: var(--font);
}
.filter-btn:hover  { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-btn.disabled {
  opacity: .4; cursor: not-allowed; pointer-events: none;
}

/* ── Main layout ── */
.main { max-width: 1360px; margin: 0 auto; padding: 20px 32px; }
.page { display: none; }
.page.active { display: block; }

/* ── States ── */
.state-box {
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; color: var(--muted); font-size: 14px; gap: 10px;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Executive Summary Banner ── */
.exec-summary {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  overflow: hidden;
}
.exec-header {
  padding: 16px 24px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.exec-header .ai-icon { font-size: 20px; color: var(--ai-teal); }
.exec-header h2 { font-size: 16px; font-weight: 600; }
.exec-header .period-badge {
  margin-left: auto;
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  padding: 3px 10px;
  border-radius: 99px;
}
.exec-chips {
  display: flex; gap: 6px; padding: 10px 24px 0;
}
.exec-chip {
  padding: 3px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted);
  transition: all .15s;
}
.exec-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.exec-chip[data-cat="trend"] { }
.exec-chip[data-cat="anomaly"] { }
.exec-chip[data-cat="opportunity"] { }
.exec-chip[data-cat="threat"] { }
.exec-chip[data-cat="action"] { }
.exec-bullets {
  padding: 14px 24px 18px;
  list-style: none;
}
.exec-bullet {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0;
  font-size: 13px;
  line-height: 1.5;
  border-bottom: 1px solid #f1f5f9;
}
.exec-bullet:last-child { border-bottom: none; }
.bullet-icon {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  margin-top: 1px;
}
.bullet-icon.trend     { background: var(--ai-teal-bg); color: var(--ai-teal); }
.bullet-icon.anomaly   { background: var(--amber-bg); color: var(--amber); }
.bullet-icon.opportunity { background: var(--green-bg); color: var(--green); }
.bullet-icon.threat    { background: var(--red-bg); color: var(--red); }
.bullet-icon.action    { background: #eff6ff; color: var(--accent); }
.bullet-cat {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  color: var(--muted); min-width: 80px; padding-top: 2px;
}

/* ── Metric card ── */
.metric-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 20px;
}
.card-top { padding: 16px 24px 0; }
.card-title    { font-size: 14px; font-weight: 600; }
.card-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.kpi-row {
  padding: 10px 24px 0;
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.kpi-value   { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.kpi-delta {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
}
.kpi-delta.up   { background: var(--green-bg); color: var(--green); }
.kpi-delta.down { background: var(--red-bg);   color: var(--red); }
.kpi-delta.flat { background: #f1f5f9;         color: var(--muted); }
.kpi-context    { font-size: 12px; color: var(--muted); }

/* ── KPI grid (4 cols) ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
.kpi-mini {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 20px;
}
.kpi-mini-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; margin-bottom: 6px; }
.kpi-mini-value { font-size: 28px; font-weight: 700; letter-spacing: -.8px; }
.kpi-mini-delta { margin-top: 4px; }

/* ── Chart ── */
.chart-legend {
  display: flex; gap: 16px; padding: 10px 24px 0;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.leg-line           { width: 20px; height: 2px; border-radius: 1px; }
.leg-line.current   { background: var(--chart-navy); }
.leg-line.prior     { background: var(--py-color); background: repeating-linear-gradient(90deg, var(--py-color) 0, var(--py-color) 4px, transparent 4px, transparent 8px); }
.leg-line.owned     { background: var(--chart-navy); }
.leg-line.supported { background: var(--chart-blue); }
.chart-wrap { padding: 10px 20px 14px; height: 200px; position: relative; }

/* ── Glossary ── */
.glossary        { border-top: 1px solid var(--border); background: #f9fafb; }
.glossary-toggle {
  width: 100%; text-align: left;
  padding: 8px 24px;
  background: none; border: none; cursor: pointer;
  font-size: 11px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: .4px;
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font);
}
.glossary-body {
  display: none;
  padding: 0 24px 12px;
  font-size: 12px; color: var(--muted); line-height: 1.7;
}
.glossary-body.open { display: block; }
.glossary-body strong { color: var(--text); font-weight: 600; }
.glossary-body code  { background: var(--border); padding: 1px 5px; border-radius: 3px; font-size: 11px; }

/* ── N/A note ── */
.na-note {
  background: var(--amber-bg);
  border-left: 3px solid var(--amber);
  padding: 8px 12px;
  margin: 0 24px 10px;
  font-size: 12px;
  color: #92400e;
  border-radius: 0 4px 4px 0;
}

/* ── Section headings ── */
.section-title {
  font-size: 16px; font-weight: 600; margin: 24px 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-title .ai-icon { color: var(--ai-teal); }

/* ── I2A Breakdown Table ── */
.i2a-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.i2a-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  padding: 8px 16px;
  border-bottom: 2px solid var(--border);
}
.i2a-table td {
  padding: 10px 16px;
  border-bottom: 1px solid #f1f5f9;
}
.i2a-table tr:last-child td { border-bottom: none; }
.i2a-table .action-name { font-weight: 600; }
.i2a-table .coming-soon { color: var(--muted); font-style: italic; }

/* ── Engagement Breakdown ── */
.eng-tabs {
  display: flex; gap: 0; margin-bottom: 12px;
}
.eng-tab {
  padding: 8px 16px;
  background: none; border: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all .15s;
  font-family: var(--font);
}
.eng-tab:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.eng-tab:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
.eng-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.eng-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.eng-table th, .i2a-table th {
  text-align: left; font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .4px;
  padding: 8px 12px; border-bottom: 2px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
}
.eng-table th:hover, .i2a-table th:hover { color: var(--text); }
.eng-table th .sort-arrow, .i2a-table th .sort-arrow { font-size: 10px; margin-left: 3px; }
.eng-table td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
.eng-table tr:last-child td { border-bottom: none; }

/* ── Funnel visualization ── */
.funnel-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 0;
}
.funnel-label { width: 180px; font-size: 12px; font-weight: 500; }
.funnel-bar-wrap { flex: 1; height: 28px; background: #f1f5f9; border-radius: 4px; position: relative; overflow: hidden; }
.funnel-bar { height: 100%; border-radius: 4px; transition: width .5s; display: flex; align-items: center; padding-left: 10px; font-size: 11px; font-weight: 600; color: #fff; }
.funnel-bar.bottleneck { box-shadow: inset 0 0 0 2px var(--red); }
.funnel-value { font-size: 12px; font-weight: 600; width: 60px; text-align: right; }
.funnel-dropoff { font-size: 11px; color: var(--red); width: 80px; }

@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <h1>Reporting & Analytics Dashboard</h1>
      <p>Reporting &amp; Analytics — Decision Intelligence</p>
    </div>
  </div>
  <div class="header-right">
    Source: mc-analytics-devel.bi_product.rpt_RA_L1L3_Test_03_04<br>
    <span id="last-updated">—</span><br>
    <span id="data-freshness" style="font-size:10px;">—</span>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="overview">Executive Overview</button>
  <button class="tab-btn" data-tab="details">Detailed Analytics</button>
  <button class="tab-btn" data-tab="funnels">Page Funnels</button>
</div>

<div class="filters">
  <div class="filter-group">
    <label>Segment</label>
    <button class="filter-btn active" data-filter="ecu" data-value="all">All</button>
    <button class="filter-btn" data-filter="ecu" data-value="ecu">ECU</button>
    <button class="filter-btn" data-filter="ecu" data-value="non_ecu">Non-ECU</button>
  </div>
  <div class="filter-group">
    <label>Value</label>
    <button class="filter-btn active" data-filter="hvc" data-value="all">All</button>
    <button class="filter-btn" data-filter="hvc" data-value="hvc">HVC</button>
    <button class="filter-btn" data-filter="hvc" data-value="non_hvc">Non-HVC</button>
  </div>
  <div class="filter-group">
    <label>Granularity</label>
    <button class="filter-btn" data-filter="granularity" data-value="weekly">Weekly</button>
    <button class="filter-btn active" data-filter="granularity" data-value="monthly">Monthly</button>
  </div>
  <div class="filter-group">
    <label>Date Range</label>
    <button class="filter-btn active" data-filter="dateRange" data-value="all">All</button>
    <button class="filter-btn" data-filter="dateRange" data-value="7">1W</button>
    <button class="filter-btn" data-filter="dateRange" data-value="30">30D</button>
    <button class="filter-btn" data-filter="dateRange" data-value="60">60D</button>
    <button class="filter-btn" data-filter="dateRange" data-value="90">90D</button>
    <button class="filter-btn" data-filter="dateRange" data-value="180">180D</button>
    <button class="filter-btn" data-filter="dateRange" data-value="365">1Y</button>
    <button class="filter-btn" data-filter="dateRange" data-value="custom" id="custom-date-btn">Custom</button>
  </div>
  <div class="filter-group" id="custom-date-group" style="display:none;">
    <label>From</label>
    <input type="date" id="date-start-input" value="2024-01-01" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);">
    <label>To</label>
    <input type="date" id="date-end-input" value="" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);">
    <button class="filter-btn" onclick="applyCustomDate()" style="background:var(--accent);color:#fff;border-color:var(--accent);">Apply</button>
  </div>
</div>

<div class="main">
  <!-- ── PAGE 1: Executive Overview ──────────────────────────────────────── -->
  <div id="page-overview" class="page active">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
      <div id="exec-summary-wow"></div>
      <div id="exec-summary-yoy"></div>
    </div>
    <div id="kpi-grid-container"></div>
    <div id="overview-charts"></div>
  </div>

  <!-- ── PAGE 2: Detailed Analytics ──────────────────────────────────────── -->
  <div id="page-details" class="page">
    <div id="i2a-section"></div>
    <div id="engagement-section"></div>
    <div id="adoption-section"></div>
  </div>

  <!-- ── PAGE 3: Page Funnels ────────────────────────────────────────────── -->
  <div id="page-funnels" class="page">
    <div id="page-funnel-container"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  STATE & CONSTANTS
// ═══════════════════════════════════════════════════════════════════════════════
const state = { ecu: "all", hvc: "all", granularity: "monthly", dateRange: "all", date_start: "2024-01-01", date_end: "" };
const chartInstances = {};
let currentTab = "overview";
let engagementTab = "all";

// ═══════════════════════════════════════════════════════════════════════════════
//  TAB NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-" + currentTab).classList.add("active");
  });
});

// ═══════════════════════════════════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════════════════════════════════
document.querySelectorAll(".filter-btn:not(.disabled)").forEach(btn => {
  btn.addEventListener("click", () => {
    const { filter, value } = btn.dataset;
    if (!filter) return;
    state[filter] = value;
    document.querySelectorAll(`.filter-btn[data-filter="${filter}"]`)
      .forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    // Date range logic
    if (filter === "dateRange") {
      const customGroup = document.getElementById("custom-date-group");
      if (value === "custom") {
        customGroup.style.display = "flex";
        return; // Don't reload until Apply is clicked
      } else {
        customGroup.style.display = "none";
        if (value === "all") {
          state.date_start = "2024-01-01";
          state.date_end = "";
        } else {
          const days = parseInt(value);
          const end = new Date();
          const start = new Date();
          start.setDate(end.getDate() - days);
          state.date_start = start.toISOString().slice(0, 10);
          state.date_end = "";
        }
      }
    }
    loadData();
  });
});

function applyCustomDate() {
  const ds = document.getElementById("date-start-input").value;
  const de = document.getElementById("date-end-input").value;
  if (ds) state.date_start = ds;
  if (de) state.date_end = de;
  loadData();
}


// ═══════════════════════════════════════════════════════════════════════════════
//  FORMATTERS
// ═══════════════════════════════════════════════════════════════════════════════
const fmtPct   = v => v == null ? "N/A" : v.toFixed(1) + "%";
const fmtRatio = v => v == null ? "N/A" : v.toFixed(2);
function fmtCurrency(v) {
  if (!v) return "$0";
  if (v >= 1e9) return "$" + (v / 1e9).toFixed(1) + "B";
  if (v >= 1e6) return "$" + (v / 1e6).toFixed(1) + "M";
  if (v >= 1e3) return "$" + (v / 1e3).toFixed(1) + "K";
  return "$" + v.toFixed(0);
}
function fmtCount(v) {
  if (v == null) return "–";
  if (v >= 1e6) return (v / 1e6).toFixed(1) + "M";
  if (v >= 1e3) return (v / 1e3).toFixed(1) + "K";
  return v.toLocaleString();
}
function fmtDate(s) {
  if (!s) return "";
  const d = new Date(s + "T00:00:00");
  return state.granularity === "monthly"
    ? d.toLocaleDateString("en-US", { month: "short", year: "numeric" })
    : d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

// ═══════════════════════════════════════════════════════════════════════════════
//  COMPARISON UTILITIES — show BOTH WoW and YoY simultaneously
// ═══════════════════════════════════════════════════════════════════════════════
function _oneDelta(cur, pri, label, isRatio = false) {
  if (cur == null || pri == null || pri === 0)
    return `<span class="kpi-delta flat">No ${label} data</span>`;
  const diff = cur - pri;
  const cls  = diff > 0 ? "up" : diff < 0 ? "down" : "flat";
  const arrow = diff > 0 ? "▲" : diff < 0 ? "▼" : "—";
  const sign  = diff > 0 ? "+" : "";
  const val = isRatio
    ? `${sign}${diff.toFixed(2)} ${label}`
    : `${sign}${diff.toFixed(1)} pp ${label}`;
  return `<span class="kpi-delta ${cls}">${arrow} ${val}</span>`;
}

function deltaBoth(cur, pw, py, isRatio = false) {
  const isWeekly = state.granularity === "weekly";
  let html = "";
  if (isWeekly && pw != null) html += _oneDelta(cur, pw, "WoW", isRatio) + " ";
  html += _oneDelta(cur, py, "YoY", isRatio);
  return html;
}

// Back-compat: single delta for places that need it
function delta(cur, pri, isRatio = false, label = "YoY") {
  return _oneDelta(cur, pri, label, isRatio);
}

function latest(data, key) {
  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i][key] != null) return data[i][key];
  }
  return null;
}

function latestPrior(data, key) {
  const prefix = getComparePrefix();
  return latest(data, prefix + key);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  CHART BUILDER (supports comparison modes)
// ═══════════════════════════════════════════════════════════════════════════════
function buildChart(id, labels, current, priorWeek, priorYear, fmt, opts = {}) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  const el = document.getElementById(id);
  if (!el) return;
  const ctx = el.getContext("2d");
  const isWeekly = state.granularity === "weekly";

  const datasets = [{
    label: "Current",
    data: current,
    borderColor: opts.color || "#111111",
    backgroundColor: opts.fill ? (opts.fillColor || "rgba(17,17,17,.05)") : "transparent",
    borderWidth: 2.5,
    pointRadius: 2,
    pointHoverRadius: 5,
    pointBackgroundColor: opts.color || "#111111",
    tension: 0.35,
    fill: !!opts.fill,
    spanGaps: true,
  }];

  // Prior Week (WoW) — only for weekly granularity
  if (isWeekly && priorWeek) {
    datasets.push({
      label: "Prior Week",
      data: priorWeek,
      borderColor: "#666666",
      backgroundColor: "transparent",
      borderWidth: 1.5,
      borderDash: [3, 3],
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.35,
      fill: false,
      spanGaps: true,
    });
  }

  // Prior Year (YoY)
  if (priorYear) {
    datasets.push({
      label: "Prior Year",
      data: priorYear,
      borderColor: "#94a3b8",
      backgroundColor: "transparent",
      borderWidth: 1.5,
      borderDash: [6, 4],
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.35,
      fill: false,
      spanGaps: true,
    });
  }

  chartInstances[id] = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: "index" },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "rgba(17,17,17,.95)",
          padding: 10, cornerRadius: 6,
          titleFont: { size: 12, weight: "600" },
          bodyFont: { size: 12 },
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.raw == null ? "N/A" : fmt(ctx.raw)}`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 10 }, color: "#9ca3af", maxRotation: 40,
                   maxTicksLimit: state.granularity === "monthly" ? 20 : 26 }
        },
        y: {
          grid: { color: "rgba(0,0,0,.04)" },
          ticks: { font: { size: 10 }, color: "#9ca3af", callback: v => fmt(v) }
        }
      }
    }
  });
}

function buildAdoptionChart(id, labels, ownedData, totalData) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  const el = document.getElementById(id);
  if (!el) return;

  chartInstances[id] = new Chart(ctx, {

        }
      ]

      responsive: true, maintainAspectRatio: false,

// ═══════════════════════════════════════════════════════════════════════════════
//  EXECUTIVE SUMMARY RENDERER
// ═══════════════════════════════════════════════════════════════════════════════
function renderExecSummary(summaryData, containerId, modeLabel) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!summaryData || !summaryData.summary || !summaryData.summary.length) {
    el.innerHTML = `<div class="exec-summary"><div class="exec-header">
      <span class="ai-icon">✦</span><h2>Executive Summary — ${modeLabel}</h2>
    </div><div style="padding:20px 24px;color:var(--muted);font-size:13px;">
      Insufficient data for ${modeLabel} summary.
    </div></div>`;
    return;
  }

  const iconMap = { trend: "T", anomaly: "!", opportunity: "↑", threat: "↓", action: "→" };
  const bullets = summaryData.summary;
  const categories = [...new Set(bullets.map(b => b.category))];

  el.innerHTML = `
    <div class="exec-summary">
      <div class="exec-header">
        <span class="ai-icon">✦</span>
        <h2>Executive Summary — ${modeLabel}</h2>
        <span class="period-badge">${fmtDate(summaryData.period)}</span>
      </div>
      <div class="exec-chips">
        <button class="exec-chip active" data-cat="all">All</button>
        ${categories.map(c => `<button class="exec-chip" data-cat="${c}">${c.charAt(0).toUpperCase() + c.slice(1)}</button>`).join("")}
      </div>
      <ul class="exec-bullets">
        ${bullets.map(b => `
          <li class="exec-bullet" data-cat="${b.category}">
            <div class="bullet-icon ${b.category}">${iconMap[b.category] || "•"}</div>
            <div class="bullet-cat">${b.category}</div>
            <div>${b.text}</div>
          </li>
        `).join("")}
      </ul>
    </div>
  `;

  // Chip filtering
  el.querySelectorAll(".exec-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      el.querySelectorAll(".exec-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      const cat = chip.dataset.cat;
      el.querySelectorAll(".exec-bullet").forEach(b => {
        b.style.display = (cat === "all" || b.dataset.cat === cat) ? "flex" : "none";
      });
    });
  });
}

        <button class="glossary-toggle" onclick="toggleGlossary(this)">▶ Data Sources & Formulas</button>
        <div class="glossary-body">
          <strong>Attribution Window:</strong> 7 days from user's first Reporting & Analytics page view that week.<br>
          <strong>Campaign Created:</strong> Users ÷ WAU × 100. Source: <code>emails_bulk</code> joined to ECS views. Deduplicated on <code>CONCAT(user_id, campaign_id)</code>.<br>
          <strong>Automation Created:</strong> Users ÷ WAU × 100. Source: <code>customer_journey_workflows</code>. Deduplicated on <code>CONCAT(user_id, workflow_id)</code>.<br>
          <strong>Segment Created:</strong> Users ÷ WAU × 100. Source: <code>tags_segments_daily_rollup</code> where <code>action_type LIKE '%segment created%'</code>.<br>
          <strong>Δ WoW:</strong> Change vs prior week (LAG over week). <strong>Δ YoY:</strong> Change vs same period prior year (LAG over fiscal year).
        </div>
      </div>
    </div>

    ${rows.map(r => `
      <div class="metric-card">
        <div class="card-top"><div class="card-title">${r.name} — Trend (7-day window)</div></div>
        ${legendHtml}
        <div class="chart-wrap"><canvas id="${r.chartId}"></canvas></div>
      </div>
    `).join("")}
  `;

  rows.forEach(r => {
    buildChart(r.chartId, labels, r.currentData, r.pwData, r.pyData, fmtPct, { fill: true });
  });

  // Make I2A table sortable
  makeSortable(document.querySelector(".i2a-table"));
}

// ═══════════════════════════════════════════════════════════════════════════════
//  ENGAGEMENT BREAKDOWN (Page 2)
// ═══════════════════════════════════════════════════════════════════════════════
function renderEngagementSection(engData) {
  const el = document.getElementById("engagement-section");
  if (!engData || !engData.length) {
    el.innerHTML = `<div class="section-title">Engagement Breakdown</div>
      <div class="metric-card"><div style="padding:20px 24px;color:var(--muted);font-size:13px;">No engagement data available.</div></div>`;
    return;
  }

  const latestEng = engData[engData.length - 1];

  // Find period ~1 month ago for MoM calculation
  // For monthly granularity: previous entry. For weekly: ~4 entries back.
  const isMonthly = state.granularity === "monthly";
  const momOffset = isMonthly ? 1 : 4;
  const momEng = engData.length > momOffset ? engData[engData.length - 1 - momOffset] : null;

  function makeTable(pageData, title, section) {
    if (!pageData || !Object.keys(pageData).length) return `<div style="padding:12px;color:var(--muted);font-size:13px;">No data for ${title}.</div>`;
    const entries = Object.entries(pageData).sort((a, b) => (b[1].users || 0) - (a[1].users || 0));

    // Get prior-month data for MoM
    const momSection = momEng
      ? (section === "all" ? {...(momEng.owned || {}), ...(momEng.supported || {})} : (momEng[section] || {}))
      : {};

    return `
      <table class="eng-table">
        <thead><tr><th>Page</th><th>Users</th><th>% of WAU</th><th>Δ WoW</th><th>Δ MoM</th><th>Δ YoY</th></tr></thead>
        <tbody>
          ${entries.map(([name, d]) => {
            // Use server-computed rates (correct denominators) — NOT pw_users/current_denom
            const pwPct = d.pw_rate || null;
            const pyPct = d.py_rate || null;
            // MoM: use prior-month period's pre-computed rate (already correct)
            const momPage = momSection[name];
            const momPct = momPage?.rate || null;
            return `<tr>
              <td style="font-weight:500;">${name}</td>
              <td>${fmtCount(d.users)}</td>
              <td>${fmtPct(d.rate)}</td>
              <td>${_oneDelta(d.rate, pwPct, "WoW")}</td>
              <td>${_oneDelta(d.rate, momPct, "MoM")}</td>
              <td>${_oneDelta(d.rate, pyPct, "YoY")}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    `;
  }

  // Combined totals
  const combinedData = latestEng.combined || {};
  const allViewedEntry = combinedData["RA Viewed (All)"] || {};
  const allEngagedEntry = combinedData["RA Engaged (All)"] || {};

  el.innerHTML = `
    <div class="section-title">Engagement Breakdown</div>
    <div class="metric-card">
      <div class="card-top">
        <div class="card-title">Reporting & Analytics Engagement Overview</div>
        <div class="card-subtitle">User reach across owned and supported assets</div>
      </div>
      <div class="kpi-row">
        <div class="kpi-value">${fmtPct(allViewedEntry.rate)}</div>
        <span class="kpi-delta flat">Viewed Any Reporting & Analytics Page</span>
        <div class="kpi-context">${fmtCount(allViewedEntry.users)} users / ${fmtCount(allViewedEntry.denominator)} WAU</div>
      </div>
      <div style="padding: 16px 24px 0;">
        <div class="eng-tabs">
          <button class="eng-tab active" data-eng="all">All</button>
          <button class="eng-tab" data-eng="owned">Owned Assets</button>
          <button class="eng-tab" data-eng="supported">Supported Pages</button>
          <button class="eng-tab" data-eng="owned_engaged">Owned Engaged</button>
          <button class="eng-tab" data-eng="supported_engaged">Supported Engaged</button>
        </div>
      </div>
      <div id="eng-table-container" style="padding: 0 24px 16px;">
        ${makeTable({...latestEng.owned, ...latestEng.supported}, "All", "all")}
      </div>
      <div class="glossary">
        <button class="glossary-toggle" onclick="toggleGlossary(this)">▶ Data Sources & Formulas</button>
        <div class="glossary-body">
          <strong>Source:</strong> <code>rpt_RA_L1L3_Test_03_04</code> (L2/L3 per-page metrics from Dataform pipeline).<br>
          <strong>Users:</strong> Distinct users who fired the page-specific ECS event that week/month.<br>
          <strong>% of WAU:</strong> Page users ÷ Weekly Active Users × 100.<br>
          <strong>Owned Assets:</strong> Marketing Dashboard, Audience Analytics, Conversion Insights, Custom Reports, Reports, SMS Report, Email Report, Journey Report, Replicated.<br>
          <strong>Supported Pages:</strong> Homepage, All Campaigns, All Journeys, Automation Overview, All Contacts, Audience Dashboard, Audience Segments, SMS Overview.<br>
          <strong>Engaged:</strong> Users with non-view interaction events (<code>event NOT LIKE '%viewed%'</code>).<br>
          <strong>Δ WoW:</strong> Change vs prior week. <strong>Δ MoM:</strong> Change vs ~1 month ago (4 weeks for weekly, 1 period for monthly). <strong>Δ YoY:</strong> Change vs same period prior year.
        </div>
      </div>
    </div>
  `;

  // Tab switching for engagement
  el.querySelectorAll(".eng-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      el.querySelectorAll(".eng-tab").forEach(t => t.classList.remove("active"));

        container.innerHTML = makeTable({...latestEng.owned, ...latestEng.supported}, "All", "all");
      } else if (mode === "owned") {
        container.innerHTML = makeTable(latestEng.owned, "Owned", "owned");
      } else if (mode === "supported") {
        container.innerHTML = makeTable(latestEng.supported, "Supported", "supported");
      } else if (mode === "owned_engaged") {
        container.innerHTML = makeTable(latestEng.owned_engaged, "Owned Engaged", "owned_engaged");
      } else if (mode === "supported_engaged") {
        container.innerHTML = makeTable(latestEng.supported_engaged, "Supported Engaged", "supported_engaged");
      }
      // Re-apply sorting after tab switch
      makeSortable(container.querySelector(".eng-table"));
    });

  // Make initial engagement table sortable
  makeSortable(document.querySelector("#eng-table-container .eng-table"));
}

// ═══════════════════════════════════════════════════════════════════════════════
//  PAGE FUNNELS (Page 3)
// ═══════════════════════════════════════════════════════════════════════════════
function renderPageFunnels(funnelData) {
  const el = document.getElementById("page-funnel-container");
  if (!el) return;
  if (!funnelData || !funnelData.length) {
    el.innerHTML = `<div class="metric-card"><div style="padding:20px 24px;color:var(--muted);font-size:13px;">No funnel data available.</div></div>`;
    return;
  }

  const latest = funnelData[funnelData.length - 1];
  const pages = latest.pages || [];

  function pctDelta(cur, prior) {
    if (!cur || !prior || prior === 0) return "";
    const diff = ((cur - prior) / Math.abs(prior)) * 100;
    const cls = diff > 0 ? "up" : diff < 0 ? "down" : "flat";
    const arrow = diff > 0 ? "▲" : diff < 0 ? "▼" : "—";
    return `<span class="kpi-delta ${cls}" style="font-size:10px;">${arrow}${diff >= 0 ? "+" : ""}${diff.toFixed(0)}%</span>`;
  }

  el.innerHTML = `
    <div class="section-title" style="margin-top:0;">Per-Page Funnel: Views → Insight to Action (7-day)</div>
    <div class="metric-card">
      <div style="padding:16px 24px; overflow-x:auto;">
        <table class="eng-table" style="min-width:700px;">
          <thead>
            <tr>
              <th style="min-width:220px;">Page</th>
              <th>Views</th>
              <th>Δ WoW</th>
              <th>Δ YoY</th>
              <th>I2A Users</th>
              <th>I2A Campaigns</th>
              <th>View → I2A Rate</th>
            </tr>
          </thead>
          <tbody>
            ${pages.map(p => {
              if (!p.has_data) {
                return `<tr style="opacity:0.4;"><td style="font-weight:600;">${p.label}</td>
                  <td colspan="6" style="text-align:center;font-style:italic;color:var(--muted);">Not tracked in ECS</td></tr>`;
              }
              const convRate = p.view_to_i2a || 0;
              const barColor = convRate >= 70 ? '#1a8a4a' : convRate >= 40 ? '#111' : '#c42b2b';
              return `<tr>
                <td style="font-weight:600;">${p.label}</td>
                <td>${fmtCount(p.viewers)}</td>
                <td>${pctDelta(p.viewers, p.viewers_pw)}</td>
                <td>${pctDelta(p.viewers, p.viewers_py)}</td>
                <td>${fmtCount(p.i2a_users)}</td>
                <td>${fmtCount(p.i2a_campaigns)}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <div style="flex:1;background:#f1f5f9;border-radius:3px;height:16px;min-width:60px;">
                      <div style="width:${Math.min(convRate, 100)}%;height:100%;background:${barColor};border-radius:3px;"></div>
                    </div>
                    <strong style="min-width:40px;">${convRate.toFixed(1)}%</strong>
                  </div>
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
      <div class="glossary">
        <button class="glossary-toggle" onclick="toggleGlossary(this)">▶ How this is calculated</button>
        <div class="glossary-body">
          <strong>Views:</strong> Distinct users who fired <code>reporting:viewed</code> on that specific page. Source: <code>ecs_users_activities</code>.<br>
          <strong>I2A Users:</strong> Users who created a campaign within <strong>7 days</strong> of viewing that specific page. Source: <code>emails_bulk</code> joined to page-specific ECS views.<br>
          <strong>I2A Campaigns:</strong> Total campaigns created by those I2A users within the 7-day window.<br>
          <strong>View → I2A Rate:</strong> I2A Users ÷ Views × 100. Green ≥70%, black 40-70%, red <40%.<br>
          <strong>Δ WoW / YoY:</strong> % change in view count vs prior week / prior year.
        </div>
      </div>
    </div>

    <!-- Auto-generated Insights & Recommendations -->
    ${generateFunnelInsights(pages)}
  `;

  // Make funnel table sortable
  makeSortable(el.querySelector(".eng-table"));
}

function generateFunnelInsights(pages) {
  const active = pages.filter(p => p.has_data && p.viewers > 0);
  if (!active.length) return "";

  const insights = [];
  const recs = [];

  // Sort by View→I2A conversion
  const byI2A = [...active].sort((a, b) => (b.view_to_i2a || 0) - (a.view_to_i2a || 0));
  const byI2ALow = [...active].filter(p => p.viewers > 1000).sort((a, b) => (a.view_to_i2a || 999) - (b.view_to_i2a || 999));
  const byViews = [...active].sort((a, b) => b.viewers - a.viewers);

  // Top I2A converter
  if (byI2A[0]?.view_to_i2a > 0) {
    insights.push(`<strong>${byI2A[0].label}</strong> has the highest View→I2A rate at <strong>${byI2A[0].view_to_i2a.toFixed(1)}%</strong> — ${fmtCount(byI2A[0].i2a_users)} users took action after viewing.`);
  }

  // Lowest I2A converter
  if (byI2ALow[0] && byI2ALow[0].view_to_i2a < byI2A[0]?.view_to_i2a) {
    insights.push(`<strong>${byI2ALow[0].label}</strong> has the lowest View→I2A at <strong>${(byI2ALow[0].view_to_i2a || 0).toFixed(1)}%</strong> with ${fmtCount(byI2ALow[0].viewers)} views — high reach but low conversion.`);
  }

  // Most viewed
  insights.push(`<strong>${byViews[0].label}</strong> is the most viewed page with <strong>${fmtCount(byViews[0].viewers)}</strong> users, converting <strong>${(byViews[0].view_to_i2a || 0).toFixed(1)}%</strong> to action.`);

  // Total I2A opportunity
  const totalViews = active.reduce((s, p) => s + (p.viewers || 0), 0);
  const totalI2A = active.reduce((s, p) => s + (p.i2a_users || 0), 0);
  const avgRate = totalViews > 0 ? (totalI2A / totalViews * 100) : 0;
  insights.push(`Across all pages: <strong>${fmtCount(totalI2A)}</strong> users took action out of <strong>${fmtCount(totalViews)}</strong> total views (<strong>${avgRate.toFixed(1)}%</strong> average View→I2A rate).`);

  // YoY growth/decline in views
  const yoyGrowth = active.filter(p => p.viewers_py > 0).map(p => ({
    ...p, yoy_pct: ((p.viewers - p.viewers_py) / p.viewers_py * 100)
  })).sort((a, b) => b.yoy_pct - a.yoy_pct);
  if (yoyGrowth.length && yoyGrowth[0].yoy_pct > 5) {
    insights.push(`<strong>${yoyGrowth[0].label}</strong> grew <strong>+${yoyGrowth[0].yoy_pct.toFixed(0)}% YoY</strong> in views — strongest year-over-year growth.`);
  }
  if (yoyGrowth.length > 1) {
    const worst = yoyGrowth[yoyGrowth.length - 1];
    if (worst.yoy_pct < -5) {
      insights.push(`<strong>${worst.label}</strong> declined <strong>${worst.yoy_pct.toFixed(0)}% YoY</strong> in views — needs investigation.`);
    }
  }

  // Recommendations based on conversion gaps
  if (byI2ALow[0] && byI2A[0]) {
    const gap = (byI2A[0].view_to_i2a || 0) - (byI2ALow[0].view_to_i2a || 0);
    if (gap > 10) {
      recs.push(`Close the <strong>${gap.toFixed(0)}pp conversion gap</strong> between ${byI2A[0].label} (${byI2A[0].view_to_i2a?.toFixed(1)}%) and ${byI2ALow[0].label} (${byI2ALow[0].view_to_i2a?.toFixed(1)}%) — add campaign creation CTAs to low-converting pages.`);
    }
  }
  // High-volume low-conversion pages
  const highVolLowConv = active.filter(p => p.viewers > 50000 && (p.view_to_i2a || 0) < avgRate);
  if (highVolLowConv.length) {
    recs.push(`Focus on <strong>${highVolLowConv.map(p => p.label).join(", ")}</strong> — high traffic but below-average conversion. Small % improvements here have outsized impact.`);
  }
  // YoY declining pages
  if (yoyGrowth.length) {
    const declining = yoyGrowth.filter(p => p.yoy_pct < -10);
    if (declining.length) {
      recs.push(`Investigate declining viewership on <strong>${declining.map(p => p.label).join(", ")}</strong> (down >10% YoY) — consider refresh or feature improvements.`);
    }
  }
  recs.push(`A/B test page layouts and in-page prompts on lowest-converting pages to lift View→I2A rates.`);

  return `
    <div class="metric-card" style="margin-top:16px;">
      <div class="card-top">
        <div class="card-title" style="display:flex;align-items:center;gap:8px;">
          <span class="ai-icon">✦</span> Key Insights & Recommendations
        </div>
      </div>
      <div style="padding:12px 24px 8px;">
        <div style="font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted);letter-spacing:.4px;margin-bottom:8px;">Insights</div>
        <ul style="list-style:none;padding:0;">
          ${insights.map(i => `<li style="padding:5px 0;font-size:13px;line-height:1.5;border-bottom:1px solid #f1f5f9;">● ${i}</li>`).join("")}
        </ul>
      </div>
      <div style="padding:4px 24px 16px;">
        <div style="font-size:12px;font-weight:600;text-transform:uppercase;color:var(--muted);letter-spacing:.4px;margin-bottom:8px;">Recommendations</div>
        <ul style="list-style:none;padding:0;">
          ${recs.map(r => `<li style="padding:5px 0;font-size:13px;line-height:1.5;border-bottom:1px solid #f1f5f9;">→ ${r}</li>`).join("")}
        </ul>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  SORTABLE TABLES — click any column header to sort
// ═══════════════════════════════════════════════════════════════════════════════
function makeSortable(table) {
  if (!table) return;
  const headers = table.querySelectorAll("thead th");
  if (!headers.length) return;

  let currentCol = -1;
  let ascending = false;

  headers.forEach((th, colIdx) => {
    th.addEventListener("click", () => {
      const tbody = table.querySelector("tbody");
      if (!tbody) return;
      const rows = Array.from(tbody.querySelectorAll("tr"));

      // Separate pinned rows (Coming Soon, Not tracked) from sortable rows
      const sortable = [];
      const pinned = [];
      rows.forEach(r => {
        const text = r.textContent.toLowerCase();
        if (text.includes("coming soon") || text.includes("not tracked")) {
          pinned.push(r);
        } else {
          sortable.push(r);
        }
      });

      // Toggle direction
      if (currentCol === colIdx) {
        ascending = !ascending;
      } else {
        currentCol = colIdx;
        ascending = false; // First click = descending (high to low)
      }

      // Parse cell value for sorting
      function parseVal(row) {
        const cell = row.querySelectorAll("td")[colIdx];
        if (!cell) return 0;
        let text = cell.textContent.trim();
        // Strip delta badges — get just the number
        if (text.includes("pp")) text = text.replace(/[▲▼—]/g, "").replace(/pp.*/, "").trim();
        // Handle formatted numbers: 1.5M, 89.1K, 26.8%
        if (text === "—" || text === "N/A" || text === "") return ascending ? Infinity : -Infinity;
        let num = text.replace(/[,$%]/g, "");
        if (num.endsWith("M")) num = parseFloat(num) * 1e6;
        else if (num.endsWith("K")) num = parseFloat(num) * 1e3;
        else if (num.endsWith("B")) num = parseFloat(num) * 1e9;
        else num = parseFloat(num);
        return isNaN(num) ? text.toLowerCase() : num;
      }

      sortable.sort((a, b) => {
        const va = parseVal(a);
        const vb = parseVal(b);
        if (typeof va === "string" && typeof vb === "string") {
          return ascending ? va.localeCompare(vb) : vb.localeCompare(va);
        }
        return ascending ? va - vb : vb - va;
      });

      // Rebuild tbody: sorted rows first, pinned at bottom
      sortable.forEach(r => tbody.appendChild(r));
      pinned.forEach(r => tbody.appendChild(r));

      // Update header arrows
      headers.forEach((h, i) => {
        const existing = h.querySelector(".sort-arrow");
        if (existing) existing.remove();
        if (i === colIdx) {
          const arrow = document.createElement("span");
          arrow.className = "sort-arrow";
          arrow.textContent = ascending ? " ▲" : " ▼";
          h.appendChild(arrow);
        }
      });
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
//  GLOSSARY TOGGLE
// ═══════════════════════════════════════════════════════════════════════════════
function toggleGlossary(btn) {
  const body = btn.nextElementSibling;
  const open = body.classList.toggle("open");
  btn.childNodes[0].nodeValue = open ? "▼ How this is calculated" : "▶ How this is calculated";
}

//  DATA FETCH & ORCHESTRATION
// ═══════════════════════════════════════════════════════════════════════════════

let SNAPSHOT_MATRIX = null;
async function loadMatrix() { if (SNAPSHOT_MATRIX) return SNAPSHOT_MATRIX; try { const r = await fetch('snapshot_matrix.json'); SNAPSHOT_MATRIX = await r.json(); return SNAPSHOT_MATRIX; } catch(e) { return null; } }
function getSnapshotKey() { return state.ecu + '|' + state.hvc + '|' + state.granularity; }
function filterByDateRange(arr) { if (!arr || !arr.length || state.dateRange === 'all') return arr; const days = parseInt(state.dateRange); if (isNaN(days)) return arr; if (state.granularity === 'monthly') { return arr.slice(-Math.max(1, Math.ceil(days / 30))); } const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days); return arr.filter(d => d.period_start >= cutoff.toISOString().slice(0, 10)); }
function clearAllContainers(msg) { ["exec-summary-wow","exec-summary-yoy","kpi-grid-container","overview-charts","i2a-section","engagement-section","adoption-section","page-funnel-container"].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = msg || ''; }); }
async function loadData() { Object.values(chartInstances).forEach(c => c.destroy()); Object.keys(chartInstances).forEach(k => delete chartInstances[k]); clearAllContainers('<div class="state-box"><div class="spinner"></div> Loading...</div>');
  const matrix = await loadMatrix(); if (!matrix) { clearAllContainers('<div class="state-box"><strong style="color:var(--red)">Failed to load data</strong></div>'); return; }
  const key = getSnapshotKey(); const snapshot = matrix[key];
  if (!snapshot) { clearAllContainers('<div class="state-box"><strong>This filter combination requires the live server</strong></div>'); return; }
  try { const metricsData = filterByDateRange(snapshot.metrics || []); const i2aData = filterByDateRange(snapshot.i2a || []); const adoptionData = filterByDateRange(snapshot.adoption || []); const engagementData = filterByDateRange(snapshot.engagement || []); const summaryWoW = snapshot.summary_wow || null; const summaryYoY = snapshot.summary_yoy || null; const funnelData = filterByDateRange(snapshot.page_funnel || []); const adoptionMap = new Map(adoptionData.map(d => [d.period_start, d]));
    if (!metricsData.length) { clearAllContainers('<div class="state-box">No data for this date range.</div>'); return; }
    renderExecSummary(summaryWoW, "exec-summary-wow", "Week-over-Week"); renderExecSummary(summaryYoY, "exec-summary-yoy", "Year-over-Year"); renderKPIGrid(metricsData, i2aData, adoptionMap); renderOverviewCharts(metricsData, adoptionMap, i2aData); renderI2ASection(i2aData); renderEngagementSection(engagementData); document.getElementById("adoption-section").innerHTML = ''; renderPageFunnels(funnelData);
    document.getElementById('last-updated').textContent = 'Latest data: ' + fmtDate(metricsData[metricsData.length - 1]?.period_start ?? ''); document.getElementById('data-freshness').textContent = 'Snapshot refreshed Apr 6, 2026 | Filter: ' + key;
  } catch(err) { console.error(err); clearAllContainers('<div class="state-box"><strong style="color:var(--red)">Error: ' + err.message + '</strong></div>'); }
}
loadData();
